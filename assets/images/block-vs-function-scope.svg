<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="12">
  <rect width="560" height="340" fill="#fafaf5" rx="8"/>

  <!-- Title -->
  <text x="280" y="26" text-anchor="middle" fill="#1a1a1a" font-weight="bold" font-size="15">var vs let — Scope delle variabili</text>

  <!-- LEFT: var -->
  <rect x="20" y="44" width="240" height="270" rx="8" fill="#fff3b0" stroke="#d9c400" stroke-width="2"/>
  <text x="140" y="64" text-anchor="middle" fill="#7a5c00" font-weight="bold" font-size="13">var — Function Scope</text>

  <!-- Function box -->
  <rect x="36" y="76" width="208" height="210" rx="6" fill="#ffe066" stroke="#c8a800" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="140" y="96" text-anchor="middle" fill="#6b5800" font-size="11" font-weight="bold">function foo()</text>

  <!-- if block -->
  <rect x="52" y="106" width="176" height="80" rx="4" fill="#fff8cc" stroke="#bba800" stroke-width="1"/>
  <text x="140" y="122" text-anchor="middle" fill="#888" font-size="10">if (true) {</text>
  <text x="140" y="142" text-anchor="middle" fill="#c0392b" font-family="'SF Mono',Consolas,monospace" font-size="11">var bar = 2;</text>
  <text x="140" y="160" text-anchor="middle" fill="#888" font-size="10">}</text>
  <text x="140" y="176" text-anchor="middle" fill="#999" font-size="9">// bar leaks out of if!</text>

  <!-- accessible outside if -->
  <text x="140" y="210" text-anchor="middle" fill="#27ae60" font-family="'SF Mono',Consolas,monospace" font-size="11">console.log(bar); // 2</text>
  <text x="140" y="228" text-anchor="middle" fill="#888" font-size="9">accessibile ovunque in foo()</text>

  <!-- label -->
  <text x="140" y="272" text-anchor="middle" fill="#9a7d00" font-size="10">var non rispetta i blocchi {}</text>

  <!-- RIGHT: let -->
  <rect x="300" y="44" width="240" height="270" rx="8" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="420" y="64" text-anchor="middle" fill="#1a6b2a" font-weight="bold" font-size="13">let — Block Scope</text>

  <!-- Function box -->
  <rect x="316" y="76" width="208" height="210" rx="6" fill="#d4f0d4" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="420" y="96" text-anchor="middle" fill="#1a5c1a" font-size="11" font-weight="bold">function foo()</text>

  <!-- if block -->
  <rect x="332" y="106" width="176" height="80" rx="4" fill="#b8e8b8" stroke="#1e8a1e" stroke-width="1.5"/>
  <text x="420" y="122" text-anchor="middle" fill="#555" font-size="10">if (true) {</text>
  <text x="420" y="142" text-anchor="middle" fill="#1a6b2a" font-family="'SF Mono',Consolas,monospace" font-size="11">let bar = 2;</text>
  <text x="420" y="160" text-anchor="middle" fill="#555" font-size="10">}</text>
  <text x="420" y="176" text-anchor="middle" fill="#999" font-size="9">// bar lives only in if block</text>

  <!-- not accessible outside if -->
  <text x="420" y="210" text-anchor="middle" fill="#c0392b" font-family="'SF Mono',Consolas,monospace" font-size="11">console.log(bar);</text>
  <text x="420" y="226" text-anchor="middle" fill="#c0392b" font-size="10">// ReferenceError!</text>
  <text x="420" y="244" text-anchor="middle" fill="#888" font-size="9">fuori dal blocco: bar non esiste</text>

  <!-- label -->
  <text x="420" y="272" text-anchor="middle" fill="#1a6b2a" font-size="10">let è legato al blocco {}</text>

  <!-- bottom note -->
  <text x="280" y="326" text-anchor="middle" fill="#aaa" font-size="10">Block scope = dichiarare le variabili il più vicino possibile al punto d'uso</text>
</svg>
