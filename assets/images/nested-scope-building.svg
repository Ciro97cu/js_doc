<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="480" height="340" fill="#fafaf5" rx="8"/>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" fill="#1a1a1a" font-weight="bold" font-size="15">Scope annidati — ricerca verso l'esterno</text>

  <!-- Global scope (outermost / top floor) -->
  <rect x="30" y="50" width="420" height="260" fill="#fffbe0" stroke="#f7df1e" stroke-width="2.5" rx="8"/>
  <text x="240" y="74" text-anchor="middle" fill="#9a7d00" font-weight="bold" font-size="12">Global Scope</text>
  <text x="240" y="91" text-anchor="middle" fill="#6b5800" font-size="11">var b = 2;</text>

  <!-- foo() scope -->
  <rect x="70" y="100" width="340" height="180" fill="#fff3b0" stroke="#d9c400" stroke-width="2" rx="6"/>
  <text x="240" y="122" text-anchor="middle" fill="#9a7d00" font-weight="bold" font-size="12">Scope di foo()</text>
  <text x="240" y="139" text-anchor="middle" fill="#6b5800" font-size="11">function foo(a) { … }  →  a è qui</text>

  <!-- bar() scope (innermost) -->
  <rect x="110" y="152" width="260" height="110" fill="#ffe066" stroke="#c8a800" stroke-width="1.5" rx="5"/>
  <text x="240" y="173" text-anchor="middle" fill="#7a5c00" font-weight="bold" font-size="12">Scope di bar()  (corrente)</text>
  <text x="240" y="193" text-anchor="middle" fill="#5a4200" font-size="11">function bar(c) { … }  →  c è qui</text>

  <!-- Search arrow: bar -> foo -->
  <line x1="240" y1="140" x2="240" y2="152" stroke="#c00" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#rarrow)"/>

  <!-- Search arrow: foo -> global -->
  <line x1="240" y1="100" x2="240" y2="50" stroke="#c00" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#rarrow)"/>

  <!-- Legend -->
  <line x1="110" y1="280" x2="145" y2="280" stroke="#c00" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#rarrow)"/>
  <text x="152" y="284" fill="#555" font-size="11">ricerca sale verso l'esterno se variabile non trovata</text>

  <!-- "b" label with arrow showing it's found in global -->
  <rect x="310" y="200" width="50" height="22" fill="#fff8a0" stroke="#c8a800" stroke-width="1" rx="3"/>
  <text x="335" y="215" text-anchor="middle" fill="#7a5c00" font-size="11" font-weight="bold">b = ?</text>
  <path d="M335,222 Q335,248 240,248 Q180,248 180,265 Q180,280 200,286" fill="none" stroke="#c00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="310" y="300" fill="#888" font-size="10">b trovata nel Global Scope</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="rarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c00"/>
    </marker>
  </defs>
</svg>
